<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이지원 자산관리 파트너 | 프리미엄 웹명함</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Noto+Sans+KR:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0f141c;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Noto Sans KR', sans-serif;
            position: relative;
            overflow: hidden;
        }

        /* 매거진 스타일 프리미엄 웹명함 카드 */
        .magazine-card {
            width: 90%;
            max-width: 380px;
            height: 600px;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 35px 80px rgba(0,0,0,0.6);
            z-index: 2;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 배경 이미지 설정 */
        .photo-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('보험.jpg') no-repeat center center;
            background-size: cover;
            filter: brightness(0.85) contrast(1.05); 
            z-index: 1;
        }

        /* 얼굴을 가리지 않으면서 텍스트 가독성을 높이는 오버레이 보정 */
        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(to bottom, 
                rgba(15, 20, 28, 0.4) 0%, 
                rgba(15, 20, 28, 0) 30%, 
                rgba(15, 20, 28, 0.2) 50%, 
                rgba(15, 20, 28, 0.8) 75%,
                rgba(15, 20, 28, 0.95) 100%);
            z-index: 2;
        }

        .text-layer {
            position: relative;
            z-index: 3;
            height: 100%;
            padding: 45px 30px 35px 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: #fff;
            box-sizing: border-box;
        }

        .top-info {
            text-align: left;
        }

        /* 로고는 최상단에 작게 유지 */
        .brand-logo {
            font-family: 'Libre Baskerville', serif;
            font-size: 0.8rem;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.7); 
            font-weight: 700;
            text-transform: uppercase;
        }

        .footer-content {
            display: flex;
            flex-direction: column;
        }

        /* 이동된 성함 및 직함 스타일 */
        .name-area {
            margin-bottom: 20px;
            text-align: left;
        }

        .name-main {
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .role-sub {
            font-size: 0.75rem;
            font-weight: 500; 
            letter-spacing: 1.5px;
            color: #5fa4cc;
            text-transform: uppercase;
        }

        /* 기존 하단 연락처 문구 */
        .contact-text {
            font-size: 0.72rem;
            line-height: 1.5;
            font-weight: 400; 
            color: #cbd5e1;
            padding-left: 10px;
            border-left: 2px solid #4A8BB2;
            margin-bottom: 15px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-btn {
            color: #fff;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 700;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px 0;
            border-radius: 14px;
            background: rgba(15, 20, 28, 0.7);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .primary-btn {
            background: rgba(74, 139, 178, 0.9);
            border: 1px solid rgba(74, 139, 178, 0.5);
            box-shadow: 0 4px 15px rgba(74, 139, 178, 0.3);
        }
        
        .nav-btn:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-2px);
        }

        /* -------------------------------------------
           스마트 챗봇 스타일 (우측 중앙 고정)
        -------------------------------------------- */
        .gemi-bot-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            z-index: 9999;
        }

        .gemi-bot-bubble {
            background-color: #4A8BB2;
            color: #ffffff;
            font-size: 13px;
            font-weight: 700;
            padding: 10px 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
            animation: bounce 2s infinite;
            cursor: pointer;
        }

        .gemi-bot-bubble::after {
            content: '';
            position: absolute;
            bottom: -6px;
            right: 20px;
            border-width: 6px 6px 0;
            border-style: solid;
            border-color: #4A8BB2 transparent;
        }

        .gemi-bot-button {
            width: 56px;
            height: 56px;
            background-color: #4A8BB2;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }

        .gemi-bot-icon {
            width: 26px;
            height: 26px;
            fill: #ffffff;
        }

        .gemi-chat-window {
            position: fixed;
            bottom: 95px;
            right: 24px;
            width: 370px;
            height: 550px;
            background-color: #F8F8F8;
            border-radius: 20px;
            display: none; 
            z-index: 10000;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.1);
        }

        .gemi-chat-window iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .gemi-chat-close {
            position: absolute;
            top: 12px;
            right: 15px;
            width: 28px;
            height: 28px;
            background-color: rgba(0, 0, 0, 0.4);
            color: #ffffff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* 모바일 반응형 위치 조정 */
        @media (max-width: 600px) {
            .gemi-bot-container {
                bottom: auto; top: 50%; transform: translateY(-50%); right: 16px;   
            }
            .gemi-bot-bubble { font-size: 11px; padding: 8px 12px; }
            .gemi-bot-button { width: 48px; height: 48px; }
            .gemi-chat-window { top: 50%; bottom: auto; transform: translateY(-50%); right: 16px; width: calc(100vw - 32px); height: 70vh; }
        }
    </style>
</head>
<body>

    <div class="magazine-card">
        <div class="photo-bg"></div>
        <div class="overlay"></div>

        <div class="text-layer">
            <div class="top-info">
                <div class="brand-logo">Premium Financial</div>
            </div>

            <div class="footer-content">
                <div class="name-area">
                    <div class="name-main">이지원</div>
                    <div class="role-sub">Asset Management Partner</div>
                </div>

                <div class="contact-text">
                    "새는 보험료는 잡고, 보장 혜택은 든든하게!"<br>
                    📞 010-1234-5678 &nbsp;|&nbsp; 📧 jw_lee_ins@naver.com<br>
                    🏆 2025 생명·손해보험 우수설계사 인증
                </div>

                <div class="button-group">
                    <a href="javascript:void(0);" onclick="toggleChat();" class="nav-btn primary-btn">🔍 내 보험료 무료 분석하기</a>
                    <div style="display: flex; gap: 8px; width: 100%;">
                        <a href="./promotion.html" class="nav-btn" style="flex: 1;">📝 브랜드 스토리</a>
                        <a href="tel:01012345678" class="nav-btn" style="flex: 1;">📞 바로 통화</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="gemi-bot-container">
        <div class="gemi-bot-bubble" id="botBubble" onclick="toggleChat()">
            이지원 스마트 비서 시작하기!
        </div>
        <div class="gemi-bot-button" onclick="toggleChat()">
            <svg class="gemi-bot-icon" viewBox="0 0 24 24">
                <path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"/>
            </svg>
        </div>
    </div>

    <div class="gemi-chat-window" id="chatWindow">
        <div class="gemi-chat-close" onclick="toggleChat()">X</div>
        <iframe src="https://typebot.co/my-typebot-8pspgev" allow="geolocation; microphone; camera"></iframe>
    </div>

    <script>
        function toggleChat() {
            var chatWindow = document.getElementById('chatWindow');
            var botBubble = document.getElementById('botBubble');
            if (chatWindow.style.display === 'none' || chatWindow.style.display === '') {
                chatWindow.style.display = 'flex'; 
                botBubble.style.opacity = '0';     
                botBubble.style.pointerEvents = 'none';
            } else {
                chatWindow.style.display = 'none';  
                botBubble.style.opacity = '1';      
                botBubble.style.pointerEvents = 'auto';
            }
        }
    </script>

</body>
</html>
